name: spotify-power-browser
# Per-worktree isolation (parallel Claude Code sessions share one Docker daemon):
#   IMAGE_TAG            overrides the shared image tag       (default: latest)
#   COMPOSE_PROJECT_NAME overrides the project name that namespaces containers,
#                        networks and volumes                 (default: the name: above)
# .claude/settings.json's SessionStart hook writes those into a gitignored .env
# AND a gitignored compose.override.yaml (ports: !reset []) for worktrees under
# .claude/worktrees/*, so their stacks never collide on the shared tag/project
# and publish no host ports (5672/15672/8000) — the per-project network already
# connects the services. The PRIMARY checkout gets neither file: shared
# defaults, fixed localhost ports, warm redis_data. Live crawls (the real host
# Neo4j graph + warm dedup cache) are singular: run them from the primary
# checkout, one at a time.
services:
  rabbitmq:
    image: "rabbitmq:4-management"
    # Host ports for the primary checkout; worktree stacks drop these via a
    # hook-written compose.override.yaml (they reach services over the
    # per-project network, so they need no host publishing).
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      start_period: 5s
      interval: 5s
      timeout: 10s
      retries: 20

  redis:
    image: "redis:8-alpine"
    # Durable crawled-URL dedup cache. AOF + a named volume so the "seen" set
    # persists across container restarts AND across crawl runs.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - "redis_data:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 20

  # Neo4j runs on the host via Neo4j Desktop (bolt://host.docker.internal:7687),
  # not as a container — a containerized instance would collide on port 7687
  # with the running Desktop, and the Desktop gives persistence + a graph
  # browser for inspecting results. To go fully in-Docker instead: quit Neo4j
  # Desktop, uncomment this service, drop the NEO4J_HOSTNAME override on
  # responses_write_to_neo4j, and set neo4j_credentials.yaml to match NEO4J_AUTH.
  #
  # neo4j:
  #   image: "neo4j:community"
  #   ports:
  #     - "7687:7687"
  #     - "7474:7474"
  #   volumes:
  #     - "neo4j_data:/data"
  #   environment:
  #     NEO4J_AUTH: "neo4j/my_spotify_data"
  #   healthcheck:
  #     test: wget http://localhost:7474 || exit 1
  #     start_period: 5s
  #     interval: 5s
  #     timeout: 10s
  #     retries: 20

  spotify_authentication:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    volumes:
      - "./secrets:/src/secrets"
      - "./data:/src/data"
    ports:
      - "8000:8000"
    # Plan 06 T4: /login/start mints single-use OAuth state nonces into Redis
    # and /callback consumes them, so this service now needs the cache.
    depends_on:
      redis:
        condition: service_healthy
        restart: true
    links:
      - redis
    environment:
      REDIS_HOSTNAME: ${REDIS_HOSTNAME:-redis}
    command: python3 application/spotify_authentication/api_authorization_web_service.py
    healthcheck:
      # Healthy only once the OAuth flow has written an access token. This
      # gates the pipeline so a single `docker compose up` waits for the human
      # to authorize before any crawling begins. The long start_period keeps the
      # container in "starting" (not "unhealthy") while it waits for a human, so
      # `docker compose up` won't abort the gated services if authorization takes
      # a while; the first successful probe flips it healthy immediately.
      #
      # Plan 06 keeps this file as the PRIMARY user's mirror (token_store.py):
      # the first account to authorize writes both secrets/users/<id>/ and this
      # legacy path, so multi-user auth does not break the one-command `up`.
      test: ["CMD-SHELL", "test -s /src/secrets/spotify_api_token.secret"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 3600s

  api_call_engine:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    # The whole project shares one image; build it once here, the other
    # services reference the same tag.
    build: .
    volumes:
      - "./secrets:/src/secrets"
      - "./data:/src/data"
    depends_on:
      rabbitmq:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      spotify_authentication:
        condition: service_healthy
    links:
      - rabbitmq
      - redis
    command: bash -c "sleep 5 && python3 application/api_call_engine.py"
    # Crawl-efficiency flags, overridable at `docker compose up` time, e.g.
    #   RESET_CRAWL=true USE_BATCH_ENDPOINTS=true docker compose up
    # Defaults mirror application/config.py so an unset shell var keeps the
    # documented default (notably CRAWLED_URL_DEDUP stays ON).
    environment:
      RESET_CRAWL: ${RESET_CRAWL:-false}
      RESET_CRAWL_CATALOG: ${RESET_CRAWL_CATALOG:-false}
      USE_BATCH_ENDPOINTS: ${USE_BATCH_ENDPOINTS:-false}
      CRAWLED_URL_DEDUP: ${CRAWLED_URL_DEDUP:-true}
      CRAWL_ARTIST_DISCOGRAPHIES: ${CRAWL_ARTIST_DISCOGRAPHIES:-false}
      ARTIST_AFFINITY_MIN: ${ARTIST_AFFINITY_MIN:-3}

  responses_write_to_disk:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    volumes:
      - "./secrets:/src/secrets"
      - "./data:/src/data"
    depends_on:
      rabbitmq:
        condition: service_healthy
        restart: true
    links:
      - rabbitmq
    command: python3 application/response_handlers/main.py write_to_disk
    environment:
      RESET_CRAWL: ${RESET_CRAWL:-false}
      RESET_CRAWL_CATALOG: ${RESET_CRAWL_CATALOG:-false}
      USE_BATCH_ENDPOINTS: ${USE_BATCH_ENDPOINTS:-false}
      CRAWLED_URL_DEDUP: ${CRAWLED_URL_DEDUP:-true}
      CRAWL_ARTIST_DISCOGRAPHIES: ${CRAWL_ARTIST_DISCOGRAPHIES:-false}
      ARTIST_AFFINITY_MIN: ${ARTIST_AFFINITY_MIN:-3}

  responses_write_to_neo4j:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    # Point this worker at Neo4j Desktop on the host rather than a container.
    environment:
      NEO4J_HOSTNAME: host.docker.internal
      RESET_CRAWL: ${RESET_CRAWL:-false}
      RESET_CRAWL_CATALOG: ${RESET_CRAWL_CATALOG:-false}
      USE_BATCH_ENDPOINTS: ${USE_BATCH_ENDPOINTS:-false}
      CRAWLED_URL_DEDUP: ${CRAWLED_URL_DEDUP:-true}
      CRAWL_ARTIST_DISCOGRAPHIES: ${CRAWL_ARTIST_DISCOGRAPHIES:-false}
      ARTIST_AFFINITY_MIN: ${ARTIST_AFFINITY_MIN:-3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./secrets:/src/secrets"
      - "./data:/src/data"
    depends_on:
      rabbitmq:
        condition: service_healthy
        restart: true
    links:
      - rabbitmq
    command: python3 application/response_handlers/main.py write_to_neo4j

  responses_follow_links:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    volumes:
      - "./secrets:/src/secrets"
      - "./data:/src/data"
    depends_on:
      rabbitmq:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    links:
      - rabbitmq
      - redis
    command: python3 application/response_handlers/main.py follow_links
    environment:
      RESET_CRAWL: ${RESET_CRAWL:-false}
      RESET_CRAWL_CATALOG: ${RESET_CRAWL_CATALOG:-false}
      USE_BATCH_ENDPOINTS: ${USE_BATCH_ENDPOINTS:-false}
      CRAWLED_URL_DEDUP: ${CRAWLED_URL_DEDUP:-true}
      CRAWL_ARTIST_DISCOGRAPHIES: ${CRAWL_ARTIST_DISCOGRAPHIES:-false}
      ARTIST_AFFINITY_MIN: ${ARTIST_AFFINITY_MIN:-3}

  requests_factory_start_crawls:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    volumes:
      - "./secrets:/src/secrets"
      - "./data:/src/data"
    depends_on:
      api_call_engine:
        condition: service_started
        restart: true
      responses_write_to_disk:
        condition: service_started
        restart: true
      responses_write_to_neo4j:
        condition: service_started
        restart: true
      responses_follow_links:
        condition: service_started
        restart: true
      spotify_authentication:
        condition: service_healthy
      redis:
        condition: service_healthy
        restart: true
    links:
      - rabbitmq
      - redis
    command: bash -c "sleep 5 && python3 application/requests_factory.py"
    environment:
      # The discography seeder (CRAWL_ARTIST_DISCOGRAPHIES) queries Neo4j for
      # qualifying artists, so this service needs the same host-Desktop
      # pointer as responses_write_to_neo4j.
      NEO4J_HOSTNAME: host.docker.internal
      RESET_CRAWL: ${RESET_CRAWL:-false}
      RESET_CRAWL_CATALOG: ${RESET_CRAWL_CATALOG:-false}
      USE_BATCH_ENDPOINTS: ${USE_BATCH_ENDPOINTS:-false}
      CRAWLED_URL_DEDUP: ${CRAWLED_URL_DEDUP:-true}
      CRAWL_ARTIST_DISCOGRAPHIES: ${CRAWL_ARTIST_DISCOGRAPHIES:-false}
      ARTIST_AFFINITY_MIN: ${ARTIST_AFFINITY_MIN:-3}
      # Set CRAWL_LIKED_SONGS=false to run a discography-only crawl (skip
      # re-paginating an already-crawled Liked Songs library).
      CRAWL_LIKED_SONGS: ${CRAWL_LIKED_SONGS:-true}
      # Plan 06 multiplayer: which user(s) to seed for. Default: the primary
      # user (legacy no-user mode when nobody authorized via /login yet).
      #   CRAWL_USER=<spotify_user_id> docker compose up     one user
      #   CRAWL_ALL_USERS=true docker compose up             all, sequentially
      CRAWL_USER: ${CRAWL_USER:-}
      CRAWL_ALL_USERS: ${CRAWL_ALL_USERS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  spotify_mock:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    # A controllable mock of the Spotify Web API, for tests and mock-backed runs.
    # Not part of the normal `up` (profile-gated). Listens on :80 so request URLs
    # carry no port (the dispatcher strips ports). The crawler reaches it at
    # http://spotify_mock — set SPOTIFY_API_BASE_URL=http://spotify_mock to crawl it.
    profiles: ["test", "mock"]
    volumes:
      - "./mock_spotify:/src/mock_spotify"
    command: python3 -m mock_spotify.app
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/_control/health || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 3s

  tests:
    image: "spotify-power-browser:${IMAGE_TAG:-latest}"
    # Test runner -- not part of the normal `up`. Run with:
    #   docker compose run --rm tests
    # It brings up rabbitmq + redis; the Neo4j tests use the host Desktop and
    # skip if it isn't running. Tests are mounted so they change without a rebuild.
    profiles: ["test"]
    environment:
      NEO4J_HOSTNAME: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Read-only: the suite must NEVER write the real tokens. Even if a test
      # forgets to isolate token_store to tmp_path, :ro turns a silent clobber of
      # secrets/spotify_*.secret + secrets/users/ (which breaks the live app's
      # auth) into a loud failure. The non-token secrets tests legitimately read
      # (neo4j creds, client id/secret) stay readable.
      - "./secrets:/src/secrets:ro"
      - "./tests:/src/tests"
      # mock_spotify normally runs as the spotify_mock service, but tests that
      # drive the catalog/mock app in-process (plans 03 + 08) import it
      # directly — mount it so those tests run (not skip) in compose.
      - "./mock_spotify:/src/mock_spotify"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      spotify_mock:
        condition: service_healthy
    command: python3 -m pytest tests/

volumes:
  redis_data:

